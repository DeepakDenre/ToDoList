<!DOCTYPE html>
<html>

<head>
  <title>To do List</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <div class="header">
    <table>
      <td class="logo">
        <img src="img/logo.png" alt="logo" width="100" height="100">
      </td>
      <td class="title">
        <h2>To do List</h2>
      </td>
    </table>
  </div>
  <table id="content-table">
    <tr>
      <th class="No">No.</th>
      <th class="Task" style="text-align: center;">Task</th>
      <th class="DueDate">Due Date</th>
      <th class="Completed">Completed</th>
    </tr>
    <script src="script/row.js"></script>
  </table>
</body>

</html>
